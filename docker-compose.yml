version: "3.9"

services:
  db:
    image: postgres:15
    container_name: checkbill-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: checkbill
      TZ: Asia/Bangkok
    ports:
      - "5433:5432"
    volumes:
      - checkbill-dbdata:/var/lib/postgresql/data

volumes:
  checkbill-dbdata:
